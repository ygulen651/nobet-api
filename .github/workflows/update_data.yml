name: Nöbetçi Eczane Otomatik Güncelleme

on:
  schedule:
    # Her gün Türkiye saatiyle gece 00:00 ve sabah 08:00'de otomatik çalışır
    - cron: '0 21,5 * * *' 
  workflow_dispatch: # İstediğinde elle de başlatabilirsin

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Repo'yu Klonla
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 selenium==4.15.2

    - name: Güncellemeyi Çalıştır
      env:
        RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
      run: python cloud_updater.py

    - name: Değişiklikleri Kaydet (Otomatik)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Auto-update: $(date)" || echo "No changes to commit"
        git push origin main || echo "No changes to push"
