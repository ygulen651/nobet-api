name: Nöbetçi Eczane Otomatik Güncelleme

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Repo'yu Klonla
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Güncellemeyi Çalıştır
      env:
        RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
      run: python cloud_updater.py
